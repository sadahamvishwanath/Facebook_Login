<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Facebook – Log in or Sign up</title>

    <link rel="stylesheet" href="style.css" />

</head>
<body>

    <div class="container">

        <div class="left-section">
            <div class="logo">facebook</div>
            <div class="tagline">Explore the things you love.</div>
        </div>

        <div class="right-section">
            <div class="login-card">

                <h2>Log in to Facebook</h2>

                <form action="#" method="POST">
                    <input type="email" id="email" name="email" placeholder="Email address or mobile number" required />
                    <input type="password" id="password" name="password" placeholder="Password" required />

                    <button type="submit" class="login-btn">Login</button>
                </form>

                <a href="#" class="forgot-link">Forgotten password?</a>

                <hr class="divider" />

                <button class="create-btn">Create new account</button>

            </div>

            <p class="meta-text">Meta</p>
        </div>

    </div>

</body>
</html>
